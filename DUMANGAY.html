<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { width: 500px; height: 600px; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
    .header { background: #667eea; color: white; padding: 20px; border-radius: 10px 10px 0 0; text-align: center; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column;
    gap: 10px; }
    .message { padding: 10px 15px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
    .user-msg { background: #667eea; color: white; align-self: flex-end; }
    .bot-msg { background: #f0f0f0; color: black; align-self: flex-start; }
    .input-area { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #ddd; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #764ba2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h2>Gemini Chatbot</h2></div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      const chatBox = document.getElementById('chatBox');
      const userDiv = document.createElement('div');
      userDiv.className = 'message user-msg';
      userDiv.textContent = message;
      chatBox.appendChild(userDiv);
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        const botDiv = document.createElement('div');
        botDiv.className = 'message bot-msg';
        botDiv.textContent = data.response;
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (error) {
        console.error('Error:', error);
      }
    }
  </script>
</body>
</html>
